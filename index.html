<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Traxxo · acceso anticipado</title>
  <meta name="description" content="Traxxo · acceso anticipado a la plataforma de SEO con IA." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#09090b;
      --bg-2:#07080a;
      --fg:#fafafa;
      --muted:#71717a;
      --dim:#a1a1aa;
      --accent:#22d3ee;
      --accent-soft:rgba(34,211,238,.08);
      --accent-line:rgba(34,211,238,.22);
      --border:#1f1f23;
      --ok:#34d399;
      --err:#fca5a5;
      --font:'Inter',system-ui,-apple-system,Segoe UI,sans-serif;
      --mono:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--fg);font-family:var(--font);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow:hidden}
    a{color:inherit;text-decoration:none}
    button{font-family:var(--font)}

    /* ---------- Canvas (Matrix) ---------- */
    #fx{position:fixed;inset:0;width:100%;height:100%;display:block;z-index:0;background:radial-gradient(ellipse at 50% 40%, #0b0d12 0%, #07080a 65%, #050608 100%)}

    /* ---------- Top bar ---------- */
    .top{
      position:fixed;top:0;left:0;right:0;z-index:5;
      display:flex;align-items:center;justify-content:space-between;
      padding:18px 28px;
      pointer-events:none;
      background:linear-gradient(180deg, rgba(7,8,10,.85) 0%, rgba(7,8,10,.4) 70%, rgba(7,8,10,0) 100%);
    }
    .top > *{pointer-events:auto}
    .brand{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-weight:600;letter-spacing:.5px}
    .brand-dot{
      width:8px;height:8px;border-radius:50%;background:var(--accent);
      box-shadow:0 0 12px var(--accent),0 0 28px rgba(34,211,238,.4);
      animation:pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
    .brand-name{font-size:14px;color:var(--fg)}
    .top-link{
      font-family:var(--mono);font-size:12px;color:var(--dim);
      padding:8px 14px;border:1px solid var(--border);border-radius:999px;
      transition:color .2s,border-color .2s,background .2s;
    }
    .top-link:hover{color:var(--accent);border-color:var(--accent-line);background:var(--accent-soft)}

    /* ---------- Center stage ---------- */
    .stage{
      position:relative;z-index:3;
      min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:80px 24px 60px;
    }
    .glyph{
      font-family:var(--mono);
      font-size:11px;letter-spacing:.4em;text-transform:uppercase;
      color:var(--muted);
      margin-bottom:18px;
      opacity:0;animation:fadeIn .9s .1s forwards;
    }
    .glyph .sep{color:var(--accent);opacity:.6;margin:0 .35em}

    .wordmark{
      font-family:var(--font);
      font-weight:800;
      font-size:clamp(64px,14vw,168px);
      letter-spacing:-.05em;
      line-height:.9;
      color:var(--fg);
      position:relative;
      user-select:none;
      opacity:0;animation:fadeIn 1s .25s forwards;
    }
    .wordmark .x{
      color:var(--accent);
      text-shadow:0 0 24px rgba(34,211,238,.35),0 0 60px rgba(34,211,238,.18);
      position:relative;display:inline-block;
    }
    .wordmark::before,.wordmark::after{
      content:attr(data-text);
      position:absolute;inset:0;
      pointer-events:none;
      opacity:0;
    }
    .wordmark.glitch::before{
      animation:glitch1 .55s steps(2,end);
      color:#ff3860;mix-blend-mode:screen;
      text-shadow:none;
    }
    .wordmark.glitch::after{
      animation:glitch2 .55s steps(2,end);
      color:var(--accent);mix-blend-mode:screen;
      text-shadow:none;
    }
    @keyframes glitch1{
      0%{opacity:0;transform:translate(0,0)}
      20%{opacity:.85;transform:translate(-3px,1px) skewX(-2deg)}
      40%{opacity:.4;transform:translate(2px,-1px)}
      60%{opacity:.7;transform:translate(-1px,2px) skewX(1deg)}
      80%{opacity:.3;transform:translate(1px,0)}
      100%{opacity:0;transform:translate(0,0)}
    }
    @keyframes glitch2{
      0%{opacity:0;transform:translate(0,0)}
      20%{opacity:.6;transform:translate(2px,-2px)}
      50%{opacity:.9;transform:translate(-2px,1px) skewX(2deg)}
      80%{opacity:.5;transform:translate(1px,1px)}
      100%{opacity:0;transform:translate(0,0)}
    }

    .tagline{
      font-family:var(--mono);
      font-size:13px;color:var(--dim);
      margin-top:22px;
      letter-spacing:.05em;
      opacity:0;animation:fadeIn 1s .55s forwards;
    }
    .tagline .cur{display:inline-block;width:7px;height:14px;background:var(--accent);margin-left:4px;vertical-align:-2px;animation:blink 1s steps(2) infinite}
    @keyframes blink{50%{opacity:0}}
    @keyframes fadeIn{to{opacity:1}}

    /* ---------- Form ---------- */
    .form{
      margin-top:48px;width:100%;max-width:480px;
      display:flex;flex-direction:column;gap:14px;
      opacity:0;animation:fadeIn 1s .85s forwards;
    }
    .row{
      display:flex;gap:8px;
      background:rgba(15,17,21,.65);
      border:1px solid var(--border);
      border-radius:14px;
      padding:6px;
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      transition:border-color .25s,box-shadow .25s,background .25s;
    }
    .row:focus-within{
      border-color:var(--accent-line);
      background:rgba(15,20,26,.85);
      box-shadow:0 0 0 4px var(--accent-soft),0 12px 40px rgba(34,211,238,.08);
    }
    .row input{
      flex:1;min-width:0;
      background:transparent;border:0;outline:0;
      color:var(--fg);font-size:15px;font-family:var(--font);font-weight:500;
      padding:14px 14px;letter-spacing:.01em;
    }
    .row input::placeholder{color:var(--muted)}
    .row button{
      background:var(--accent);color:#021014;border:0;border-radius:10px;
      padding:0 22px;font-size:14px;font-weight:700;letter-spacing:.02em;
      cursor:pointer;transition:transform .15s ease,box-shadow .25s ease,filter .2s;
      box-shadow:0 0 0 0 rgba(34,211,238,.5);
    }
    .row button:hover{filter:brightness(1.08);box-shadow:0 0 30px rgba(34,211,238,.35)}
    .row button:active{transform:translateY(1px)}
    .row button:disabled{opacity:.6;cursor:wait}

    .meta{
      display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;
      font-family:var(--mono);font-size:11px;color:var(--muted);
      padding:2px 8px 0;
    }
    .meta a{color:var(--dim);border-bottom:1px dotted rgba(255,255,255,.15);padding-bottom:1px;transition:color .2s}
    .meta a:hover{color:var(--accent);border-color:var(--accent-line)}
    .privacy{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
    .privacy input{accent-color:var(--accent);width:13px;height:13px}

    .feedback{
      min-height:18px;font-family:var(--mono);font-size:12px;text-align:center;letter-spacing:.02em;
      transition:color .2s;
    }
    .feedback.err{color:var(--err)}
    .feedback.ok{color:var(--ok)}

    /* ---------- Success state ---------- */
    .success{
      position:relative;text-align:center;
      max-width:480px;
      padding:40px 28px;
      border:1px solid var(--accent-line);
      background:linear-gradient(180deg, rgba(34,211,238,.06), rgba(34,211,238,0));
      border-radius:18px;
      backdrop-filter:blur(14px);
      animation:popIn .55s cubic-bezier(.2,.9,.3,1.2);
    }
    @keyframes popIn{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    .success h2{font-size:22px;margin:0 0 10px;font-weight:700;letter-spacing:-.01em}
    .success p{font-size:14px;color:var(--dim);margin:0;line-height:1.6}
    .success .ok-mark{
      width:54px;height:54px;border-radius:50%;
      border:1px solid var(--accent-line);background:var(--accent-soft);
      display:flex;align-items:center;justify-content:center;margin:0 auto 16px;
    }
    .success .ok-mark svg{width:22px;height:22px;stroke:var(--accent);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

    /* ---------- Footer ---------- */
    .foot{
      position:fixed;left:0;right:0;bottom:0;z-index:4;
      display:flex;justify-content:space-between;align-items:center;
      padding:14px 28px;
      font-family:var(--mono);font-size:11px;color:var(--muted);
      pointer-events:none;
      background:linear-gradient(180deg, rgba(7,8,10,0) 0%, rgba(7,8,10,.85) 60%, rgba(7,8,10,1) 100%);
    }
    .foot a{pointer-events:auto;transition:color .2s}
    .foot a:hover{color:var(--accent)}
    .foot .right{display:flex;gap:18px}

    /* ---------- Responsive ---------- */
    @media (max-width:560px){
      .top{padding:14px 18px}
      .top-link{font-size:11px;padding:7px 11px}
      .stage{padding:90px 20px 80px}
      .form{margin-top:36px}
      .foot{padding:10px 18px;font-size:10px;flex-direction:column;gap:6px}
      .foot .right{gap:12px}
      .row{flex-direction:column;padding:8px}
      .row button{width:100%;padding:14px}
    }

    @media (prefers-reduced-motion:reduce){
      .glyph,.wordmark,.tagline,.form{opacity:1!important;animation:none!important}
      .brand-dot{animation:none}
    }
  </style>
</head>
<body>
  <canvas id="fx" aria-hidden="true"></canvas>

  <header class="top">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">traxxo</span>
    </div>
    <a href="https://app.traxxo.ai" class="top-link">login →</a>
  </header>

  <main class="stage">
    <div class="glyph">private<span class="sep">·</span>beta<span class="sep">·</span>by invitation</div>

    <h1 class="wordmark" id="wordmark" data-text="tra×xo">
      tra<span class="x">×</span>xo
    </h1>

    <div class="tagline">acceso anticipado<span class="cur"></span></div>

    <div id="form-wrap">
      <form class="form" id="lead-form" autocomplete="on" novalidate>
        <div class="row">
          <input type="email" id="f-email" name="email" placeholder="tu email" required autocomplete="email" inputmode="email" spellcheck="false" />
          <button type="submit" id="f-submit">apuntarme</button>
        </div>

        <div class="meta">
          <label class="privacy">
            <input type="checkbox" id="f-privacy" required />
            <span>acepto la <a href="/privacidad.html">privacidad</a></span>
          </label>

        </div>

        <div class="feedback" id="feedback" role="status" aria-live="polite"></div>

        <input type="text" name="website2" id="f-website2" tabindex="-1" autocomplete="off" style="position:absolute;left:-9999px" />
      </form>
    </div>
  </main>

  <footer class="foot">
    <div>traxxo.ai · 2026</div>
    <div class="right">
      <a href="mailto:hola@traxxo.ai">hola@traxxo.ai</a>
      <a href="/terminos.html">términos</a>
      <a href="/privacidad.html">privacidad</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  (function(){
    'use strict';

    // ============================================================
    //  MATRIX RAIN with cursor force-field
    // ============================================================
    var canvas = document.getElementById('fx');
    var ctx = canvas.getContext('2d', { alpha: true });
    var W=0, H=0, DPR=Math.min(window.devicePixelRatio||1, 2);

    // SEO & data tokens: HTTP, métricas, headers, status codes, números
    var TOKENS = [
      'GET','POST','200','301','302','404','500','SEO','CTR','ROI','KW','KWs','SERP',
      'H1','H2','H3','META','ALT','TITLE','URL','DNS','DOM','CSS','API','JSON','XML',
      'GA4','GSC','UTM','LCP','FCP','CLS','INP','TTFB','RPS','QPS','SSR','CSR',
      'ROBOTS','SITEMAP','CANON','HREFLANG','SCHEMA','OG','CTA','SKU','EAT','EEAT',
      'ML','LLM','RAG','NLP','EMB','TOK','VEC','GPT','AI',
      'IDX','RANK','CRAWL','BOT','SPIDER','LINKS','BACKLINK','ANCHOR','NOFOLLOW',
      'TRAFFIC','VISITS','BOUNCE','CONV','REV','€','%','$','#','@'
    ];
    var DIGITS = '0123456789'.split('');
    function pickGlyph(){
      // 35% probability: a single digit (clean rain feel); 65%: a token
      if (Math.random() < 0.35) return DIGITS[(Math.random()*DIGITS.length)|0];
      return TOKENS[(Math.random()*TOKENS.length)|0];
    }

    var FONT_SIZE = 14;
    var COL_WIDTH = 64;            // wider than font size: tokens need horizontal room
    var columns = [];
    var pointer = { x: -9999, y: -9999, active: false };
    var FORCE_RADIUS = 200;
    var FORCE_RADIUS_SQ = FORCE_RADIUS*FORCE_RADIUS;

    function resize(){
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W*DPR;
      canvas.height = H*DPR;
      canvas.style.width = W+'px';
      canvas.style.height = H+'px';
      ctx.setTransform(DPR,0,0,DPR,0,0);
      ctx.font = '600 '+FONT_SIZE+'px JetBrains Mono, ui-monospace, monospace';
      ctx.textBaseline = 'top';

      // Build columns. Each column is a vertical stream; each cell holds one token.
      var cols = Math.ceil(W / COL_WIDTH);
      columns = new Array(cols);
      for (var i=0;i<cols;i++){
        var len = 5 + Math.floor(Math.random()*18);
        var trail = new Array(len);
        for (var j=0;j<len;j++) trail[j] = pickGlyph();
        columns[i] = {
          x: i*COL_WIDTH + 8,
          y: Math.random()*H,
          speed: 0.6 + Math.random()*1.6,
          length: len,
          trail: trail,
          stepCounter: 0,
        };
      }
    }

    function drawFrame(t){
      // Soft fade for trailing trails
      ctx.fillStyle = 'rgba(7,8,10,0.18)';
      ctx.fillRect(0,0,W,H);

      var px = pointer.x, py = pointer.y, active = pointer.active;

      var ROW_H = FONT_SIZE + 4;

      for (var i=0;i<columns.length;i++){
        var c = columns[i];
        var cx = c.x;

        var dxh = cx - px, dyh = c.y - py;
        var dh2 = dxh*dxh + dyh*dyh;

        // Force-field: only accelerate (no horizontal jitter, no halo)
        var localSpeed = c.speed;
        var headBrightness = 1;
        if (active && dh2 < FORCE_RADIUS_SQ){
          var pull = 1 - Math.sqrt(dh2)/FORCE_RADIUS;
          localSpeed += pull*4.5;
          headBrightness = 1 + pull*1.1;
        }

        c.y += localSpeed;
        if (c.y > H + c.length*ROW_H){
          // Recycle this column with new tokens
          c.y = -Math.random()*200;
          c.speed = 0.6 + Math.random()*1.6;
          c.length = 5 + Math.floor(Math.random()*18);
          c.trail = new Array(c.length);
          for (var jj=0;jj<c.length;jj++) c.trail[jj] = pickGlyph();
        }

        // Cycle the head token periodically so the rain feels alive,
        // but slow enough that tokens stay readable.
        c.stepCounter++;
        if (c.stepCounter > 6 + (i%5)){
          c.stepCounter = 0;
          // shift trail down, push new head
          for (var s=c.length-1;s>0;s--) c.trail[s] = c.trail[s-1];
          c.trail[0] = pickGlyph();
        }

        for (var k=c.length-1; k>=0; k--){
          var yy = c.y - k*ROW_H;
          if (yy < -ROW_H || yy > H) continue;
          var tail = 1 - (k/c.length);
          var ch = c.trail[k];

          if (k===0){
            var aHead = Math.min(1, 0.92 * headBrightness);
            ctx.fillStyle = 'rgba(220,255,255,'+aHead+')';
            ctx.shadowColor = 'rgba(34,211,238,'+(0.55*headBrightness)+')';
            ctx.shadowBlur = 10*headBrightness;
            ctx.fillText(ch, cx, yy);
            ctx.shadowBlur = 0;
          } else {
            var aTail = tail*tail*0.78;
            if (active && dh2 < FORCE_RADIUS_SQ){
              var pull2 = 1 - Math.sqrt(dh2)/FORCE_RADIUS;
              aTail = Math.min(1, aTail + pull2*0.28);
            }
            ctx.fillStyle = 'rgba(34,211,238,'+aTail+')';
            ctx.fillText(ch, cx, yy);
          }
        }
      }
    }

    var rafId=null;
    function loop(t){
      drawFrame(t||0);
      rafId = requestAnimationFrame(loop);
    }

    // ---------- Pointer tracking + halo ----------
    function setPointer(x,y){
      pointer.x = x;
      pointer.y = y;
      pointer.active = true;
    }
    window.addEventListener('mousemove', function(e){ setPointer(e.clientX, e.clientY); }, { passive:true });
    window.addEventListener('mouseleave', function(){ pointer.active=false; });
    window.addEventListener('touchmove', function(e){
      if (e.touches && e.touches[0]) setPointer(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive:true });
    window.addEventListener('touchend', function(){ pointer.active=false; });

    // ---------- Reduced motion ----------
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    window.addEventListener('resize', resize);
    resize();
    if (!reduceMotion) {
      loop();
    } else {
      // Static frame
      ctx.fillStyle = '#07080a';
      ctx.fillRect(0,0,W,H);
    }

    // ============================================================
    //  WORDMARK glitch on hover/click
    // ============================================================
    var wordmark = document.getElementById('wordmark');
    var glitchTimer=null;
    function triggerGlitch(){
      wordmark.classList.remove('glitch');
      // force reflow
      void wordmark.offsetWidth;
      wordmark.classList.add('glitch');
      clearTimeout(glitchTimer);
      glitchTimer = setTimeout(function(){ wordmark.classList.remove('glitch'); }, 600);
    }
    wordmark.addEventListener('mouseenter', triggerGlitch);
    wordmark.addEventListener('click', triggerGlitch);
    // random idle glitch
    setInterval(function(){ if (Math.random()<0.35 && document.visibilityState==='visible') triggerGlitch(); }, 6000);

    // ============================================================
    //  FORM submission → Supabase
    // ============================================================
    var sb = supabase.createClient(
      'https://ghqttckqvjptxhihojey.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdocXR0Y2txdmpwdHhoaWhvamV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDU1OTYsImV4cCI6MjA5MTIyMTU5Nn0.KlPDplMIIWQwx5oafvkfxbsm0dzPb0cbTJpCM83cqK4'
    );

    var form = document.getElementById('lead-form');
    var feedback = document.getElementById('feedback');
    var emailInput = document.getElementById('f-email');
    var privacyInput = document.getElementById('f-privacy');
    var submitBtn = document.getElementById('f-submit');
    var honeypot = document.getElementById('f-website2');
    var formWrap = document.getElementById('form-wrap');

    function setMsg(text, kind){
      feedback.textContent = text || '';
      feedback.className = 'feedback' + (kind ? ' '+kind : '');
    }

    function showSuccess(email){
      formWrap.innerHTML =
        '<div class="success">'+
          '<div class="ok-mark"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></div>'+
          '<h2>estás dentro</h2>'+
          '<p>te enviaremos novedades a <strong style="color:var(--fg)">'+escapeHtml(email)+'</strong> en cuanto haya un hueco para tu proyecto.</p>'+
        '</div>';
    }
    function escapeHtml(s){return String(s).replace(/[&<>"']/g,function(c){return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c];});}

    form.addEventListener('submit', async function(e){
      e.preventDefault();
      if (honeypot.value) return; // bot

      var email = emailInput.value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
        setMsg('email no válido', 'err');
        emailInput.focus();
        return;
      }
      if (!privacyInput.checked){
        setMsg('acepta la privacidad para continuar', 'err');
        return;
      }

      submitBtn.disabled = true;
      var orig = submitBtn.textContent;
      submitBtn.textContent = 'enviando…';
      setMsg('');

      var payload = {
        client_email: email,
        privacy_consent: true
      };

      try{
        var result = await sb.from('leads_notify').insert(payload);
        if (result.error){
          submitBtn.disabled = false;
          submitBtn.textContent = orig;
          setMsg('no se pudo enviar · escríbenos a hola@traxxo.ai', 'err');
          return;
        }
        showSuccess(email);
      } catch(err){
        submitBtn.disabled = false;
        submitBtn.textContent = orig;
        setMsg('error de red · inténtalo de nuevo', 'err');
      }
    });
  })();
  </script>
</body>
</html>
